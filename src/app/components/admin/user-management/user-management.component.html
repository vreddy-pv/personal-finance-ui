<h2>User Management</h2>

<h3>Add User</h3>
<form #addUserForm="ngForm" (ngSubmit)="createUser(addUserForm.value)">
  <input type="text" name="username" placeholder="Username" ngModel required>
  <input type="email" name="email" placeholder="Email" ngModel required>
  <input type="password" name="password" placeholder="Password" ngModel required>
  <select name="role" ngModel required>
    <option value="USER">USER</option>
    <option value="ADMIN">ADMIN</option>
  </select>
  <button type="submit" [disabled]="!addUserForm.valid">Add User</button>
</form>

<hr>

<h3>Existing Users</h3>
<table>
  <thead>
    <tr>
      <th>Username</th>
      <th>Email</th>
      <th>New Password</th>
      <th>Role</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let user of users">
      <td>{{ user.username }}</td>
      <td><input type="email" [(ngModel)]="user.email"></td>
      <td><input type="password" [(ngModel)]="user.newPassword"></td>
      <td>
        <select [(ngModel)]="user.role">
          <option value="USER">USER</option>
          <option value="ADMIN">ADMIN</option>
        </select>
      </td>
      <td>
        <button (click)="updateUser(user)">Update</button>
        <button (click)="deleteUser(user.username)">Delete</button>
      </td>
    </tr>
  </tbody>
</table>
